<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rick and Morty System</title>
    <meta
      name="description"
      content="Sistema interactivo para explorar personajes y episodios de Rick and Morty con autenticación, modo offline y tema claro/oscuro."
    />
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js" type="module"></script>
    <script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
        // Quitamos la restricción de localhost para que funcione en Render
        navigator.register("./sw.js")
            .then(reg => console.log("SW registrado con éxito", reg.scope))
            .catch(err => console.error("Fallo al registrar SW", err));
        });
    }
    </script>
  </body>
</html>
