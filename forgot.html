<div class="auth-shell">
  <form class="auth-card" id="forgot-form">
    <div class="brand">
      <div class="brand-dot"></div>
      <div class="brand-name">Rick & Morty System</div>
    </div>
    <h1>Recuperar contraseña</h1>
    <p class="subtitle">Ingresa tu correo y elige una contraseña nueva.</p>
    
    <label class="field">
      <span>Correo</span>
      <input type="email" id="for-email" required />
    </label>
    
    <label class="field">
      <span>Nueva contraseña</span>
      <input type="password" id="for-pass" required minlength="4" />
    </label>
    
    <div class="error" id="for-error"></div>
    <button class="btn block" type="submit">Restablecer</button>
    
    <div class="auth-links">
      <a href="#/login">Volver a iniciar sesión</a>
      <span></span>
    </div>
  </form>
</div>
